aid: packagecloud
name: packagecloud
description: >-
  packagecloud is a hosted private package repository service with a REST API
  for managing repositories, uploading and distributing packages across formats
  including deb, rpm, gem, npm, maven, python, and helm charts. The API enables
  automation of package lifecycle management, access control via tokens, GPG key
  management, download statistics, and package promotion across repositories.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/packagecloud/refs/heads/main/apis.yml
created: 2026-06-13
modified: 2026-06-13
specificationVersion: "0.19"
tags:
  - Package Management
  - Repository Hosting
  - DevOps
  - Debian
  - RPM
  - RubyGems
  - npm
  - Maven
  - Helm
  - CI/CD
apis:
  - aid: packagecloud:packagecloud-api
    name: packagecloud REST API
    description: >-
      REST API for automating common tasks for debian, rpm, rubygems, python,
      npm, maven, and helm packages. Supports repository management, package
      upload and deletion, access token management, GPG key management,
      package promotion, search, and download statistics. All requests are
      authenticated via HTTP Basic Auth using an API token over HTTPS.
    humanURL: https://packagecloud.io/docs/api
    baseURL: https://packagecloud.io/api/v1
    tags:
      - Packages
      - Repositories
      - Tokens
      - GPG Keys
      - Statistics
    properties:
      - type: Documentation
        url: https://packagecloud.io/docs/api
